
<style>
#erd { overflow-x: auto; }
#erd svg { min-width: 900px; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a40' : '#eeedfe',
    primaryBorderColor: dark ? '#534ab7' : '#7f77dd',
    primaryTextColor: dark ? '#cecbf6' : '#26215c',
    secondaryColor: dark ? '#1a2a22' : '#e1f5ee',
    secondaryBorderColor: dark ? '#0f6e56' : '#1d9e75',
    tertiaryColor: dark ? '#2a1f14' : '#faeeda',
    tertiaryBorderColor: dark ? '#854f0b' : '#ba7517',
  },
});

const diagram = `erDiagram
  users {
    uuid user_id PK
    string username
    string email
    string password_hash
    enum gender
    int age
    enum role
    bool is_active
    timestamp created_at
    timestamp updated_at
  }
  refresh_tokens {
    uuid token_id PK
    uuid user_id FK
    string token_hash
    timestamp created_at
    timestamp expires_at
    timestamp revoked_at
    string replaced_by_token_hash
    bool is_remember_me
  }
  platform_config {
    uuid config_id PK
    numeric platform_fee
    uuid updated_by FK
    timestamp updated_at
  }
  operator_switch_requests {
    uuid request_id PK
    uuid user_id FK
    enum status
    uuid reviewed_by FK
    timestamp reviewed_at
    timestamp created_at
  }
  routes {
    uuid route_id PK
    uuid operator_id FK
    string source
    string destination
    enum status
    uuid approved_by FK
    timestamp approved_at
    string rejection_reason
    timestamp created_at
    timestamp updated_at
  }
  buses {
    uuid bus_id PK
    uuid operator_id FK
    uuid route_id FK
    string registration_number
    time departure_time
    time arrival_time
    numeric seat_price
    enum status
    timestamp created_at
    timestamp updated_at
  }
  bus_schedules {
    uuid schedule_id PK
    uuid bus_id FK
    date travel_date
    timestamp created_at
  }
  seats {
    uuid seat_id PK
    uuid schedule_id FK
    string seat_number
    enum status
    timestamp freeze_expires_at
    uuid booked_by_user_id FK
  }
  bookings {
    uuid booking_id PK
    uuid user_id FK
    uuid schedule_id FK
    numeric total_amount
    numeric platform_fee_snapshot
    enum status
    enum refund_status
    numeric refund_amount
    timestamp cancelled_at
    timestamp created_at
    timestamp updated_at
  }
  booking_seats {
    uuid booking_seat_id PK
    uuid booking_id FK
    uuid seat_id FK
    string passenger_name
    int passenger_age
    enum passenger_gender
    bool is_primary
  }
  payments {
    uuid payment_id PK
    uuid booking_id FK
    numeric amount
    enum status
    string payer_name
    string payer_email
    string transaction_ref
    timestamp paid_at
    timestamp created_at
  }
  notifications {
    uuid notification_id PK
    uuid recipient_user_id FK
    string type
    string subject
    string body
    timestamp sent_at
    uuid related_booking_id FK
  }
  discount_vouchers {
    uuid voucher_id PK
    uuid user_id FK
    string code
    numeric discount_percent
    bool is_used
    timestamp expires_at
    timestamp created_at
  }

  users ||--o{ refresh_tokens : "has"
  users ||--o{ routes : "operates"
  users ||--o{ buses : "owns"
  users ||--o{ bookings : "makes"
  users ||--o{ operator_switch_requests : "requests"
  users ||--o{ discount_vouchers : "holds"
  users }o--o{ operator_switch_requests : "reviews"
  users }o--o{ routes : "approves"
  users }o--|| platform_config : "updates"
  routes ||--o{ buses : "has"
  buses ||--o{ bus_schedules : "scheduled as"
  bus_schedules ||--o{ seats : "has"
  bus_schedules ||--o{ bookings : "linked to"
  bookings ||--o{ booking_seats : "contains"
  seats ||--o{ booking_seats : "in"
  bookings ||--o| payments : "paid via"
  bookings ||--o{ notifications : "triggers"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
